agents:
  root:
    model: openai/gpt-4o-mini
    description: NLP Service Debugger
    instruction: |
      Analyze GitHub Actions errors:
      1. Docker Hub timeout pulling python:3.11-slim  
      2. Missing git submodule backend-services/paraphrase-service
      
      Investigate root causes and delegate fixes to fixer agent.
    sub_agents: [fixer]
    toolsets:
      - type: filesystem

  fixer:
    model: openai/gpt-4o-mini
    description: GitHub Actions Fixer
    instruction: |
      Create minimal fixes for diagnosed problems.
      Provide exact file changes, paths, and git commands.
    toolsets:
      - type: filesystem
      - type: shell
